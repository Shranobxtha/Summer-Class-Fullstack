<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Mobile CSS */
        .container{
            width: 100%;
            height: 50vh;
            background-color: antiquewhite;
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr;
            
        }
        /* Tablet CSS */
        @media(min-width: 768px){
            .container{
            grid-template-columns: 1fr 1fr;
            }
        }
        /* Laptop CSS */
        @media(min-width: 1024px){
            .container{
            grid-template-columns: 1fr 1fr 1fr;
            }
        }
        .box{
            padding: 4px;
            background-color: aqua;
            height: auto;
            /*width: 100px;*/
            border: 1px solid black;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            Hello
        </div>
        <div class="box">
            World
        </div>
        <div class="box">
            Hello
        </div>
        <div class="box">
            World
        </div>
    </div>
</body>
</html>
